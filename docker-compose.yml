services:
  frontend:
    build:
      context: ../Capstone-frontend
      args:
        EXPO_PUBLIC_SERVER_IP: ${EXPO_PUBLIC_SERVER_IP}
        EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai
    networks:
      - capstone-net

  backend:
    build:
      context: ../Capstone-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend.env
    networks:
      - capstone-net

  ai:
    build:
      context: ../Capstone-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai.env
    networks:
      - capstone-net

networks:
  capstone-net:
    driver: bridge
